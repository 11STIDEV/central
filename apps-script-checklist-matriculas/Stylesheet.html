<style>
  :root {
    --bg: #0b1020;
    --bg-2: #111733;
    --panel: #151c3a;
    --panel-2: #1b2348;
    --border: #232c5c;
    --text: #e6e8ff;
    --muted: #8b94c2;
    --accent: #7c5cff;
    --accent-2: #5b8cff;
    --ok: #2fd47f;
    --warn: #ffc14d;
    --crit: #ff5d7a;
    --info: #4fb8ff;
    --shadow: 0 6px 20px rgba(0,0,0,.35);
    --radius: 14px;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: radial-gradient(1200px 600px at 10% -10%, #1e2557 0%, transparent 60%),
                radial-gradient(1000px 500px at 110% 10%, #2a1b5a 0%, transparent 60%),
                var(--bg);
    color: var(--text);
    font: 14px/1.45 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  button { font: inherit; color: inherit; cursor: pointer; }

  /* Layout */
  #app {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
  }
  .sidebar {
    background: linear-gradient(180deg, #0e1430 0%, #0a0f24 100%);
    border-right: 1px solid var(--border);
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 8px 14px;
    border-bottom: 1px solid var(--border);
  }
  .brand-mark {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: grid; place-items: center;
    font-weight: 800; letter-spacing: .5px;
    box-shadow: var(--shadow);
  }
  .brand-title { font-weight: 700; }
  .brand-sub { color: var(--muted); font-size: 12px; }

  .nav { display: flex; flex-direction: column; gap: 4px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    background: transparent; border: 0; color: var(--muted);
    padding: 10px 12px; border-radius: 10px;
    text-align: left; width: 100%;
    transition: background .15s, color .15s;
  }
  .nav-item .ic { width: 22px; text-align: center; }
  .nav-item:hover { background: var(--panel); color: var(--text); }
  .nav-item.active {
    background: linear-gradient(90deg, rgba(124,92,255,.18), rgba(91,140,255,.05));
    color: var(--text);
    box-shadow: inset 2px 0 0 var(--accent);
  }
  .badge {
    margin-left: auto;
    background: var(--crit); color: #fff;
    border-radius: 999px; padding: 2px 8px;
    font-size: 11px; font-weight: 700;
  }
  .sidebar-foot {
    margin-top: auto;
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    gap: 8px;
  }
  .user { color: var(--muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-ghost {
    background: transparent; border: 1px solid var(--border);
    color: var(--text); padding: 6px 10px; border-radius: 8px;
    font-size: 12px;
  }
  .btn-ghost:hover { background: var(--panel); }

  /* Topbar */
  .main { display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px; padding: 20px 28px; border-bottom: 1px solid var(--border);
    background: rgba(11,16,32,.6); backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 5;
  }
  .topbar h1 { font-size: 20px; margin: 0; }
  .muted { color: var(--muted); font-size: 13px; }
  .search {
    display: flex; align-items: center; gap: 8px;
    background: var(--panel); border: 1px solid var(--border);
    padding: 8px 12px; border-radius: 10px; min-width: 320px;
  }
  .search input {
    background: transparent; border: 0; outline: 0; color: var(--text);
    width: 100%;
  }

  .view { padding: 24px 28px; }
  .loading { color: var(--muted); padding: 40px; text-align: center; }

  /* KPIs */
  .kpi-grid {
    display: grid; gap: 14px;
    grid-template-columns: repeat(4, minmax(0,1fr));
    margin-bottom: 20px;
  }
  .kpi {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }
  .kpi::after {
    content: ''; position: absolute; right: -30px; top: -30px;
    width: 120px; height: 120px; border-radius: 50%;
    background: radial-gradient(closest-side, rgba(124,92,255,.25), transparent);
  }
  .kpi h3 { margin: 0 0 6px; font-size: 12px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .5px; }
  .kpi .val { font-size: 28px; font-weight: 800; }
  .kpi .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .kpi.ok .val { color: var(--ok); }
  .kpi.warn .val { color: var(--warn); }
  .kpi.crit .val { color: var(--crit); }
  .kpi.info .val { color: var(--info); }

  /* Cards / panels */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 18px;
  }
  .panel h2 {
    margin: 0 0 12px; font-size: 15px; font-weight: 600;
  }
  .grid-2 { display: grid; gap: 14px; grid-template-columns: 1fr 1fr; }

  /* Progress bar */
  .pbar {
    background: var(--bg-2); border-radius: 999px; height: 8px;
    overflow: hidden;
  }
  .pbar > span {
    display: block; height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
  }

  /* Table */
  .table-wrap { overflow: auto; border-radius: 10px; border: 1px solid var(--border); }
  table.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.tbl th, table.tbl td {
    padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left;
    white-space: nowrap;
  }
  table.tbl th {
    background: var(--bg-2); color: var(--muted); font-weight: 600; position: sticky; top: 0;
  }
  table.tbl tbody tr { cursor: pointer; transition: background .12s; }
  table.tbl tbody tr:hover { background: rgba(124,92,255,.08); }
  table.tbl td.col-prog { width: 160px; }
  table.tbl td.col-prog .pbar { width: 110px; display: inline-block; vertical-align: middle; margin-right: 8px; }

  .pill {
    display: inline-block; padding: 3px 9px; border-radius: 999px;
    font-size: 11px; font-weight: 700; letter-spacing: .3px;
  }
  .pill.ok { background: rgba(47,212,127,.15); color: var(--ok); }
  .pill.warn { background: rgba(255,193,77,.15); color: var(--warn); }
  .pill.crit { background: rgba(255,93,122,.18); color: var(--crit); }
  .pill.info { background: rgba(79,184,255,.15); color: var(--info); }
  .pill.muted { background: var(--bg-2); color: var(--muted); }

  /* Filtros */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .chip {
    background: var(--panel); border: 1px solid var(--border);
    color: var(--muted); border-radius: 999px;
    padding: 6px 12px; font-size: 12px;
  }
  .chip.active {
    color: var(--text);
    background: linear-gradient(90deg, rgba(124,92,255,.25), rgba(91,140,255,.15));
    border-color: var(--accent);
  }

  /* Etapas bars */
  .stage-row {
    display: grid; grid-template-columns: 220px 1fr 80px;
    gap: 12px; align-items: center;
    padding: 8px 0; border-bottom: 1px dashed var(--border);
  }
  .stage-row:last-child { border-bottom: 0; }
  .stage-row .name { font-size: 13px; }
  .stage-row .section { color: var(--muted); font-size: 11px; }
  .stack-bar {
    display: flex; height: 10px; border-radius: 999px; overflow: hidden; background: var(--bg-2);
  }
  .stack-bar > span { display: block; height: 100%; }
  .stack-bar > .s-ok { background: var(--ok); }
  .stack-bar > .s-warn { background: var(--warn); }
  .stack-bar > .s-crit { background: var(--crit); }
  .stage-row .pct { text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); font-size: 12px; }

  /* Drawer */
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(560px, 92vw);
    background: linear-gradient(180deg, #131a3c 0%, #0d1330 100%);
    border-left: 1px solid var(--border);
    box-shadow: -20px 0 40px rgba(0,0,0,.4);
    z-index: 50;
    transform: translateX(0);
    overflow: auto;
  }
  .drawer[hidden] { display: none; }
  .drawer-inner { padding: 22px 24px; }
  .backdrop {
    position: fixed; inset: 0; background: rgba(5,8,20,.55);
    z-index: 40; backdrop-filter: blur(2px);
  }
  .backdrop[hidden] { display: none; }
  .drawer-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .drawer-head h2 { margin: 0 0 4px; font-size: 18px; }
  .drawer-head .x {
    background: transparent; border: 0; color: var(--muted);
    font-size: 22px; line-height: 1; cursor: pointer;
  }
  .drawer .meta { color: var(--muted); font-size: 12px; }
  .drawer .checklist { margin-top: 18px; display: flex; flex-direction: column; gap: 8px; }
  .check-item {
    display: grid; grid-template-columns: 1fr 160px;
    align-items: center; gap: 10px;
    padding: 10px 12px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px;
  }
  .check-item .title { font-size: 13px; }
  .check-item .section { color: var(--muted); font-size: 11px; }
  .check-item select {
    background: var(--bg-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 8px; font-size: 12px;
  }
  .section-label {
    margin-top: 12px;
    font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted);
  }

  /* Toast */
  .toast {
    position: fixed; right: 20px; bottom: 20px;
    background: var(--panel); border: 1px solid var(--border);
    color: var(--text); padding: 10px 14px; border-radius: 10px;
    box-shadow: var(--shadow);
    z-index: 60;
  }
  .toast.err { border-color: var(--crit); color: var(--crit); }
  .toast.ok { border-color: var(--ok); color: var(--ok); }

  @media (max-width: 980px) {
    #app { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; flex-direction: row; flex-wrap: wrap; }
    .nav { flex-direction: row; flex-wrap: wrap; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .grid-2 { grid-template-columns: 1fr; }
    .search { min-width: 0; width: 100%; }
  }
</style>
